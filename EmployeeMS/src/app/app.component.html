<div class="container-fluid">
  <nav class="navbar navbar-dark bg-primary mb-4" *ngIf="currentUser">
    <div class="container">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-building"></i> Employee Management System
      </span>
      <div class="user-info">
        <span class="user-name">{{ currentUser.username }}</span>
        <button class="avatar-btn ms-3" type="button" (click)="toggleProfilePanel()" title="Profile">
          <img [src]="getProfilePhoto()" alt="Profile" class="avatar-img" />
        </button>
        <button class="btn btn-outline-light btn-sm ms-3" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>

        <div class="profile-panel" *ngIf="showProfilePanel">
          <h6 class="mb-3">My Profile</h6>

          <div class="profile-photo-section">
            <img [src]="getProfilePhoto()" alt="Profile" class="profile-photo-preview" />
            <input type="file" accept="image/*" (change)="onPhotoSelected($event)" class="form-control form-control-sm" />
            <button class="btn btn-sm btn-outline-danger" type="button" (click)="removeProfilePhoto()" [disabled]="!profile.photoDataUrl">
              Remove Photo
            </button>
          </div>

          <label class="form-label">First Name</label>
          <input class="form-control form-control-sm mb-2" [(ngModel)]="profile.firstName" />

          <label class="form-label">Last Name</label>
          <input class="form-control form-control-sm mb-2" [(ngModel)]="profile.lastName" />

          <label class="form-label">Address</label>
          <input class="form-control form-control-sm mb-2" [(ngModel)]="profile.address" />

          <label class="form-label">Telephone Number</label>
          <input class="form-control form-control-sm mb-2" [(ngModel)]="profile.telephone" />

          <label class="form-label">Email Address</label>
          <input class="form-control form-control-sm mb-3" [value]="profile.email" readonly disabled />

          <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-sm btn-secondary" type="button" (click)="showProfilePanel = false">Close</button>
            <button class="btn btn-sm btn-primary" type="button" (click)="saveProfile()">Save</button>
          </div>
        </div>
      </div>
    </div>
  </nav>
  
  <div [ngClass]="currentUser ? 'container' : ''">
    <router-outlet></router-outlet>
  </div>
</div>
